<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Group Manager</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Tab Groups</h1>
      <button id="manage-categories-btn" class="icon-btn" title="Manage categories">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
          <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </header>

    <div class="search-bar">
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="search" placeholder="Search groups or categories…" autocomplete="off" />
      <button id="clear-search" class="clear-btn" title="Clear search">✕</button>
    </div>

    <div class="status-tabs">
      <button id="btn-all" class="status-tab active">All</button>
      <button id="btn-active" class="status-tab">Active</button>
      <button id="btn-archived" class="status-tab">Archived</button>
    </div>

    <div class="filter-row">
      <span class="filter-label">Category:</span>
      <div id="category-filters" class="category-filters"></div>
    </div>

    <div id="group-list" class="group-list">
      <div class="empty-state" id="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <p>No tab groups found</p>
        <span>Open Chrome's tab group feature to get started</span>
      </div>
    </div>
  </div>

  <!-- Category edit modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h2>Edit Group</h2>
      <p id="modal-group-name" class="modal-group-name"></p>

      <label for="category-input">Category</label>
      <input type="text" id="category-input" placeholder="e.g. Work, Personal, Research…" list="category-suggestions" />
      <datalist id="category-suggestions"></datalist>

      <label for="notes-input">Notes <span class="optional">(optional)</span></label>
      <textarea id="notes-input" placeholder="Any notes about this group…" rows="3"></textarea>

      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancel</button>
        <button id="modal-save" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Manage categories modal -->
  <div id="cat-modal" class="modal hidden">
    <div class="modal-backdrop" id="cat-modal-backdrop"></div>
    <div class="modal-box">
      <h2>Manage Categories</h2>

      <div id="cat-list" class="cat-list"></div>

      <div id="cat-empty" class="cat-empty hidden">No categories yet. Assign one to a group first.</div>

      <div class="modal-actions" style="margin-top:8px">
        <button id="cat-modal-close" class="btn-secondary">Close</button>
      </div>
    </div>
  </div>

  <!-- Rename category modal -->
  <div id="rename-modal" class="modal hidden">
    <div class="modal-backdrop" id="rename-modal-backdrop"></div>
    <div class="modal-box">
      <h2>Rename Category</h2>
      <label for="rename-input">New name</label>
      <input type="text" id="rename-input" autocomplete="off" />
      <div class="modal-actions">
        <button id="rename-cancel" class="btn-secondary">Cancel</button>
        <button id="rename-save" class="btn-primary">Rename</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
